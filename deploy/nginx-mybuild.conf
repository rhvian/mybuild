# mybuild — nginx 反向代理配置
# 把本配置拷到 /etc/nginx/sites-available/mybuild 并 sed -i 替换 your-domain.com。
# 前端 + /api 都由 control_server 提供；nginx 负责 HTTPS 终止、gzip 压缩、静态缓存。

upstream mybuild_app {
    server 127.0.0.1:8787;
    keepalive 16;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # certbot 生成路径，按实际替换
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 大 JSON gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/html;
    gzip_min_length 1024;
    gzip_proxied any;

    # 请求体大小（后续加文件上传再调大）
    client_max_body_size 4m;

    # /api/* 走 control_server，禁缓存，超时放大到 10 min（采集启停可能阻塞）
    location /api/ {
        proxy_pass http://mybuild_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    # live-data.json / source-routes.json / interface-catalog.json 禁缓存（内容会更新）
    location ~ ^/scripts/(live-data|source-routes|interface-catalog)\.json$ {
        proxy_pass http://mybuild_app;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 其它静态资源缓存 1 小时（JS/CSS/图片）
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        proxy_pass http://mybuild_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # HTML + 其它全部走 control_server
    location / {
        proxy_pass http://mybuild_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    access_log /var/log/nginx/mybuild.access.log;
    error_log  /var/log/nginx/mybuild.error.log warn;
}
